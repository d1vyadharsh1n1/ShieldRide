<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShieldRide — API host</title>
    <style>
      :root {
        --bg: #0a0e1a;
        --card: #0f1524;
        --fg: #f0f4ff;
        --muted: #8899bb;
        --accent: #3b9eff;
        --border: rgba(255, 255, 255, 0.07);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 28rem;
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1.75rem;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .actions {
        margin-top: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      a.btn {
        display: block;
        text-align: center;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid rgba(59, 158, 255, 0.35);
        background: rgba(59, 158, 255, 0.12);
        color: var(--accent);
      }
      a.btn:hover {
        background: rgba(59, 158, 255, 0.2);
      }
      a.btn-secondary {
        border-color: rgba(255, 255, 255, 0.12);
        background: transparent;
        color: var(--muted);
        font-weight: 500;
      }
      a.btn-secondary:hover {
        color: var(--fg);
        border-color: rgba(255, 255, 255, 0.2);
      }
      code {
        font-size: 0.8rem;
        color: var(--muted);
      }
    </style>
    <!--
      Update WORKER_URL and ADMIN_URL if your Vercel project aliases change.
      Find them: Vercel dashboard → web / admin project → Domains.
    -->
  </head>
  <body>
    <div class="card">
      <h1>This URL is the backend API</h1>
      <p>
        <strong>shieldride-api.vercel.app</strong> serves JSON (health check, auth, sensors, etc.). The rider
        onboarding and dashboard run as a separate app.
      </p>
      <div class="actions">
        <a class="btn" href="https://web-mocha-kappa-43.vercel.app">Open ShieldRide (rider app)</a>
        <a class="btn" href="https://admin-eta-nine-16.vercel.app">Open admin dashboard</a>
        <a class="btn btn-secondary" href="/health">Check API — <code>/health</code> (JSON)</a>
      </div>
    </div>
  </body>
</html>
