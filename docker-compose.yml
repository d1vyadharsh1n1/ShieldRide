services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      GUIDEWIRE_MOCK_URL: http://mock_guidewire:8010
      NEXT_PUBLIC_GUIDEWIRE_MOCK_URL: http://localhost:8010
    depends_on:
      backend:
        condition: service_healthy
      mock_guidewire:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  mock_guidewire:
    build:
      context: ./mock_guidewire
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shieldride
      POSTGRES_USER: shieldride
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shieldride -d shieldride"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
